{% extends "base.html" %}

{% block content %}

<h1>Friends</h1>

<div class="card">

<form method="POST">
<input type="text" name="friend" placeholder="Enter username" required>
<button>Add Friend</button>
</form>

<hr>

<h3>Your Friends</h3>

<ul>
{% for f in data %}
<li>{{ f[0] }}</li>
{% endfor %}
</ul>

</div>

{% endblock %}
